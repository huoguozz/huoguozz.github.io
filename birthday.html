<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Crystal Dreams - Birthday Edition</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc00ff;
            --glass-bg: rgba(10, 20, 40, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            pointer-events: auto;
            margin: 5px;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #333;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        #status-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 28px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s;
            white-space: nowrap;
        }

        #photo-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 80%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }

        #photo-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #photo-modal img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .close-modal {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 30px;
            height: 30px;
            background: var(--neon-cyan);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        #cam-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: auto;
            transform: scaleX(-1);
        }

        #hand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video-source {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color:var(--neon-cyan); letter-spacing: 5px;">2026/04/22</h1>
        <div class="loader-bar"><div id="progress" class="loader-progress"></div></div>
        <button id="start-btn" class="btn" style="display:none">开启礼物</button>
    </div>

    <div id="photo-modal">
        <div class="close-modal" id="close-modal">×</div>
        <img id="modal-img" src="" alt="Memory">
        <p style="margin-top:15px; color:var(--neon-cyan); font-style: italic;">时光记忆碎片</p>
        <button id="delete-btn" class="btn" style="margin-top: 10px; border-color: #ff4d4d; color: #ff4d4d;">永久删除</button>
    </div>

    <div class="overlay">
        <div class="header">
            <button id="fullscreen-btn" class="btn">全屏</button>
            <div class="right">
                <input type="file" id="media-upload" accept="image/*" multiple style="display:none">
                <button class="btn" id="upload-btn">上传回忆</button>
            </div>
        </div>

        <div id="status-display">系统初始化...</div>

        <div class="footer">
            <button id="mode-gather" class="btn">聚合形态</button>
            <button id="mode-scatter" class="btn">星云形态</button>
        </div>

        <div id="cam-preview">
            <video id="video-source" autoplay playsinline></video>
            <canvas id="hand-canvas"></canvas>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import TWEEN from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

        // --- IndexedDB 存储逻辑 ---
        const DB_NAME = "MemoryCrystalDB";
        const STORE_NAME = "Photos";
        
        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = e => resolve(e.target.result);
                request.onerror = e => reject(e.target.error);
            });
        }

        async function savePhotoToDB(base64Data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const request = store.add({ data: base64Data, timestamp: Date.now() });
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getAllPhotosFromDB() {
            const db = await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function deletePhotoFromDB(id) {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).delete(id);
        }

        // --- 核心配置 ---
        const CONFIG = {
            particleCount: 8000, 
            crystalCount: 500,
            textParticleCount: 6000,
            surfaceParticleCount: 12000, 
            starCount: 20000, 
            primaryColor: 0x00f3ff,
            secondaryColor: 0x7000ff,
            bloomStrength: 1.8,
        };

        let scene, camera, renderer, composer, controls;
        let countdownParticles, crystalGroup, surfaceParticles, textParticles, starField;
        let memoryGroup; 
        let state = 'LOADING'; 
        let currentMode = 'GATHER'; 
        let currentEditingId = null; 
        let clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let handLandmarker;
        let video = document.getElementById('video-source');
        let handCanvas = document.getElementById('hand-canvas');
        let handCtx = handCanvas.getContext('2d');

        async function init() {
            setupScene();
            setupPostProcessing();
            setupLights();
            createStarField(); 
            await loadAssets();
            
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('start-btn').onclick = startExperience;
            document.getElementById('upload-btn').onclick = () => document.getElementById('media-upload').click();
            document.getElementById('media-upload').onchange = handleUpload;
            document.getElementById('close-modal').onclick = closeModal;
            document.getElementById('delete-btn').onclick = confirmDelete;
            document.getElementById('mode-gather').onclick = () => switchMode('GATHER');
            document.getElementById('mode-scatter').onclick = () => switchMode('SCATTER');
            document.getElementById('fullscreen-btn').onclick = toggleFullScreen;
            
            window.addEventListener('mousedown', onDocumentMouseDown);
            animate();
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 15, 80); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            window.addEventListener('resize', onWindowResize);
        }

        function createStarField() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.starCount * 3);
            const colors = new Float32Array(CONFIG.starCount * 3);
            for (let i = 0; i < CONFIG.starCount; i++) {
                const r = 600 + Math.random() * 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
                const mix = Math.random();
                if (mix > 0.9) { colors[i * 3] = 0.5; colors[i * 3 + 1] = 0.8; colors[i * 3 + 2] = 1; }
                else if (mix > 0.8) { colors[i * 3] = 0.8; colors[i * 3 + 1] = 0.5; colors[i * 3 + 2] = 1; }
                else { colors[i * 3] = 1; colors[i * 3 + 1] = 1; colors[i * 3 + 2] = 1; }
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, sizeAttenuation: true });
            starField = new THREE.Points(geo, mat);
            scene.add(starField);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), CONFIG.bloomStrength, 0.4, 0.85);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(CONFIG.primaryColor, 1500);
            p1.position.set(25, 25, 25);
            scene.add(p1);
            const p2 = new THREE.PointLight(CONFIG.secondaryColor, 1000);
            p2.position.set(-25, 15, -15);
            scene.add(p2);
        }

        function getNumberPoints(number) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 256;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 200px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(number, 128, 128);
            const imgData = ctx.getImageData(0, 0, 256, 256).data;
            const points = [];
            for (let y = 0; y < 256; y += 8) {
                for (let x = 0; x < 256; x += 8) {
                    if (imgData[(y * 256 + x) * 4] > 128) {
                        points.push({ x: (x - 128) * 0.22, y: (128 - y) * 0.22, z: (Math.random() - 0.5) * 3 });
                    }
                }
            }
            return points;
        }

        function createCountdownParticles() {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);
            for (let i = 0; i < CONFIG.particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 1000;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1000;
                colors[i * 3] = 0.2; colors[i * 3 + 1] = 0.8; colors[i * 3 + 2] = 1;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            countdownParticles = new THREE.Points(geo, mat);
            scene.add(countdownParticles);
        }

        async function animateCountdown() {
            createCountdownParticles();
            const status = document.getElementById('status-display');
            status.style.opacity = '1';
            
            // 修改点：倒计时从 5 开始
            for (let i = 5; i >= 1; i--) {
                status.innerText = "";
                const targetPoints = getNumberPoints(i.toString()); 
                await morphCountdownParticles(targetPoints);
                await new Promise(r => setTimeout(r, 600)); 
                if(i > 1) await explodeCountdownParticles();
            }
            
            status.innerText = "";
            warpSpeedTransition();
        }

        function explodeCountdownParticles() {
            return new Promise(resolve => {
                const positions = countdownParticles.geometry.attributes.position.array;
                const duration = 500;
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    new TWEEN.Tween(positions).to({ [i * 3]: (Math.random() - 0.5) * 800, [i * 3 + 1]: (Math.random() - 0.5) * 800, [i * 3 + 2]: (Math.random() - 0.5) * 800 }, duration).easing(TWEEN.Easing.Exponential.Out).onUpdate(() => { countdownParticles.geometry.attributes.position.needsUpdate = true; }).start();
                }
                setTimeout(resolve, duration);
            });
        }

        function morphCountdownParticles(targetPoints) {
            return new Promise(resolve => {
                const positions = countdownParticles.geometry.attributes.position.array;
                const duration = 1200;
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    const target = targetPoints[i % targetPoints.length];
                    new TWEEN.Tween(positions).to({ [i * 3]: target.x + (Math.random()-0.5)*1.2, [i * 3 + 1]: target.y + (Math.random()-0.5)*1.2, [i * 3 + 2]: target.z }, duration).easing(TWEEN.Easing.Quintic.Out).onUpdate(() => { countdownParticles.geometry.attributes.position.needsUpdate = true; }).start();
                }
                setTimeout(resolve, duration);
            });
        }

        function warpSpeedTransition() {
            const positions = countdownParticles.geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                new TWEEN.Tween(positions).to({ [i * 3]: positions[i * 3] * 20, [i * 3 + 1]: positions[i * 3 + 1] * 20, [i * 3 + 2]: -1500 }, 1800).easing(TWEEN.Easing.Quadratic.In).start();
            }
            new TWEEN.Tween(camera.position).to({ z: 25, y: 12 }, 2000).easing(TWEEN.Easing.Exponential.Out).onComplete(() => { scene.remove(countdownParticles); initMainScene(); }).start();
        }

        async function initMainScene() {
            state = 'MAIN';
            crystalGroup = new THREE.Group();
            scene.add(crystalGroup);
            memoryGroup = new THREE.Group();
            scene.add(memoryGroup);
            controls.autoRotate = true;

            createSurfaceParticles();
            createParticleText(); 

            const geometries = [new THREE.OctahedronGeometry(0.5), new THREE.IcosahedronGeometry(0.4)];
            for(let i=0; i<CONFIG.crystalCount; i++) {
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const h = 0.55 + Math.random() * 0.15;
                const color = new THREE.Color().setHSL(h, 0.8, 0.5);
                const mat = new THREE.MeshPhysicalMaterial({ color: color, metalness: 0.4, roughness: 0.05, transmission: 0.85, transparent: true, opacity: 1, emissive: color, emissiveIntensity: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);
                const isBottomLayer = i < CONFIG.crystalCount * 0.65;
                const radiusLimit = isBottomLayer ? 6 : 3.5;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.sqrt(Math.random()) * radiusLimit; 
                const y = isBottomLayer ? -3 + Math.random() * 3 : 1 + Math.random() * 3;
                mesh.userData.targetPos = new THREE.Vector3(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
                mesh.userData.scatterPos = new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
                mesh.userData.pulseOffset = Math.random() * Math.PI * 2;
                mesh.position.set(0,0,0);
                crystalGroup.add(mesh);
            }

            const savedPhotos = await getAllPhotosFromDB();
            savedPhotos.forEach(p => createMemoryFragment(p.data, p.id));

            switchMode('GATHER');
            initHandTracking();
        }

        async function handleUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            for (let file of Array.from(files)) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result;
                    const dbId = await savePhotoToDB(base64);
                    createMemoryFragment(base64, dbId);
                };
                reader.readAsDataURL(file);
            }
            document.getElementById('status-display').innerText = `已永久存入 ${files.length} 个记忆碎片`;
            setTimeout(() => { if(state === 'MAIN') document.getElementById('status-display').innerText = ""; }, 3000);
        }

        function createMemoryFragment(imgSrc, dbId) {
            const loader = new THREE.TextureLoader();
            loader.load(imgSrc, (texture) => {
                const geo = new THREE.BoxGeometry(2, 2, 0.2);
                const mats = [
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ map: texture }),
                    new THREE.MeshStandardMaterial({ map: texture }),
                ];
                const mesh = new THREE.Mesh(geo, mats);
                mesh.userData.isMemory = true; 
                mesh.userData.imgSrc = imgSrc;
                mesh.userData.dbId = dbId;
                
                mesh.position.set(0, 5, 0); 
                mesh.scale.set(0.1, 0.1, 0.1);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 10 + Math.random() * 15;
                const y = (Math.random() - 0.5) * 20;
                mesh.userData.scatterPos = new THREE.Vector3(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
                mesh.userData.gatherPos = new THREE.Vector3((Math.random()-0.5)*4, 1 + Math.random()*4, (Math.random()-0.5)*4);
                
                memoryGroup.add(mesh);
                
                const target = currentMode === 'GATHER' ? mesh.userData.gatherPos : mesh.userData.scatterPos;
                const targetScale = currentMode === 'GATHER' ? 0.3 : 1.5;
                new TWEEN.Tween(mesh.position).to({ x: target.x, y: target.y, z: target.z }, 2000).easing(TWEEN.Easing.Elastic.Out).start();
                new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 2000).easing(TWEEN.Easing.Elastic.Out).start();
            });
        }

        function confirmDelete() {
            if (currentEditingId === null) return;
            const confirmMsg = "确定从浏览器本地存储中永久删除此回忆吗？";
            if (confirm(confirmMsg)) {
                deletePhotoFromDB(currentEditingId);
                const meshToDelete = memoryGroup.children.find(m => m.userData.dbId === currentEditingId);
                if (meshToDelete) {
                    new TWEEN.Tween(meshToDelete.scale).to({x:0, y:0, z:0}, 500).onComplete(() => memoryGroup.remove(meshToDelete)).start();
                }
                closeModal();
            }
        }

        function onDocumentMouseDown(event) {
            if (currentMode !== 'SCATTER') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(memoryGroup.children);
            if (intersects.length > 0) {
                const clicked = intersects[0].object;
                if (clicked.userData.isMemory) {
                    currentEditingId = clicked.userData.dbId;
                    showPhotoModal(clicked.userData.imgSrc, clicked.position);
                }
            }
        }

        function showPhotoModal(src, pos) {
            const modal = document.getElementById('photo-modal');
            document.getElementById('modal-img').src = src;
            modal.classList.add('active');
            new TWEEN.Tween(camera.position).to({ x: pos.x * 1.5, y: pos.y, z: pos.z * 1.5 }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
            new TWEEN.Tween(controls.target).to({ x: pos.x, y: pos.y, z: pos.z }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
        }

        function closeModal() {
            document.getElementById('photo-modal').classList.remove('active');
            currentEditingId = null;
            new TWEEN.Tween(controls.target).to({ x: 0, y: 0, z: 0 }, 1000).start();
        }

        function getPointsFromText(text, size = 1.0) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 256;
            ctx.fillStyle = 'white'; 
            ctx.font = `bold 100px "Microsoft YaHei", "Arial", sans-serif`; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];
            const step = 2; 
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    if (imgData[(y * canvas.width + x) * 4] > 180) {
                        points.push({ x: (x - canvas.width / 2) * 0.04 * size, y: (canvas.height / 2 - y) * 0.04 * size, z: (Math.random() - 0.5) * 0.5 });
                    }
                }
            }
            return points.length > CONFIG.textParticleCount ? points.sort(() => Math.random() - 0.5).slice(0, CONFIG.textParticleCount) : points;
        }

        function createParticleText() {
            const text = "HAPPY BIRTHDAY";
            const textData = getPointsFromText(text, 0.9);
            const count = CONFIG.textParticleCount;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const targets = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                const t = textData[i % textData.length];
                targets[i*3] = t.x; targets[i*3+1] = t.y + 9.5; targets[i*3+2] = t.z;
                pos[i*3] = (Math.random()-0.5)*100; pos[i*3+1] = (Math.random()-0.5)*100; pos[i*3+2] = (Math.random()-0.5)*100;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            const mat = new THREE.PointsMaterial({ size: 0.12, color: 0x00f3ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
            textParticles = new THREE.Points(geo, mat);
            scene.add(textParticles);
        }

        function createSurfaceParticles() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const targets = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const phases = new Float32Array(CONFIG.surfaceParticleCount);
            for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                const isBottom = Math.random() > 0.4;
                const rBase = isBottom ? 6.2 : 3.8;
                const r = rBase + (Math.random() - 0.5) * 0.4;
                const yRange = isBottom ? [-3, 0.5] : [0.5, 4.5];
                const angle = Math.random() * Math.PI * 2;
                let x, y, z;
                if(Math.random() > 0.65) {
                    const rr = Math.sqrt(Math.random()) * r;
                    x = Math.cos(angle) * rr; y = yRange[1] + (Math.random() - 0.5) * 0.2; z = Math.sin(angle) * rr;
                } else {
                    x = Math.cos(angle) * r; y = yRange[0] + Math.random() * (yRange[1] - yRange[0]); z = Math.sin(angle) * r;
                }
                targets[i*3] = x; targets[i*3+1] = y; targets[i*3+2] = z;
                pos[i*3] = (Math.random()-0.5)*80; pos[i*3+1] = (Math.random()-0.5)*80; pos[i*3+2] = (Math.random()-0.5)*80;
                phases[i] = Math.random() * Math.PI * 2;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
            const mat = new THREE.PointsMaterial({ size: 0.08, color: CONFIG.primaryColor, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
            surfaceParticles = new THREE.Points(geo, mat);
            scene.add(surfaceParticles);
        }

        function switchMode(mode) {
            currentMode = mode;
            new TWEEN.Tween(surfaceParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();
            new TWEEN.Tween(textParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();
            [surfaceParticles, textParticles].forEach(pSystem => {
                const pos = pSystem.geometry.attributes.position.array;
                const targets = pSystem.geometry.attributes.targetPos.array;
                const count = pos.length / 3;
                for(let i=0; i<count; i++) {
                    const bi = i * 3;
                    const tx = mode === 'GATHER' ? targets[bi] : (Math.random()-0.5)*120;
                    const ty = mode === 'GATHER' ? targets[bi+1] : (Math.random()-0.5)*120;
                    const tz = mode === 'GATHER' ? targets[bi+2] : (Math.random()-0.5)*120;
                    new TWEEN.Tween(pos).to({ [bi]: tx, [bi+1]: ty, [bi+2]: tz }, 1500 + Math.random()*800).easing(TWEEN.Easing.Quadratic.InOut).onUpdate(() => pSystem.geometry.attributes.position.needsUpdate = true).start();
                }
            });
            crystalGroup.children.forEach(mesh => {
                const targetPos = mode === 'GATHER' ? mesh.userData.targetPos : mesh.userData.scatterPos;
                const targetScale = mode === 'GATHER' ? 0.25 : 1.0;
                new TWEEN.Tween(mesh.position).to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1500).easing(TWEEN.Easing.Quadratic.InOut).start();
                new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 1200).easing(TWEEN.Easing.Back.Out).start();
            });
            memoryGroup.children.forEach(mesh => {
                const targetPos = mode === 'GATHER' ? mesh.userData.gatherPos : mesh.userData.scatterPos;
                const targetScale = mode === 'GATHER' ? 0.3 : 1.5;
                new TWEEN.Tween(mesh.position).to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1800).easing(TWEEN.Easing.Exponential.Out).start();
                new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 1500).easing(TWEEN.Easing.Elastic.Out).start();
            });
        }

        async function loadAssets() {
            const progress = document.getElementById('progress');
            for(let i=0; i<=100; i+=10) { progress.style.width = i + '%'; await new Promise(r => setTimeout(r, 50)); }
        }

        function startExperience() {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading-screen').remove(); animateCountdown(); }, 1000);
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        async function initHandTracking() {
            try {
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await vision.HandLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
            } catch (e) { console.warn("Hand Tracking Disabled"); }
        }

        async function predictWebcam() {
            if (!handLandmarker || video.paused) return;
            const results = handLandmarker.detectForVideo(video, performance.now());
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            if (results.landmarks && results.landmarks.length > 0) {
                const l = results.landmarks[0];
                const dist = Math.hypot(l[8].x - l[0].x, l[8].y - l[0].y);
                if (dist < 0.25 && currentMode !== 'GATHER') switchMode('GATHER');
                else if (dist > 0.45 && currentMode !== 'SCATTER') switchMode('SCATTER');
            }
            window.requestAnimationFrame(predictWebcam);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            TWEEN.update();
            controls.update();
            if (starField) { starField.rotation.y += 0.0002; starField.rotation.x += 0.0001; }
            if (state === 'MAIN') {
                if (textParticles && currentMode === 'GATHER') {
                    const pos = textParticles.geometry.attributes.position.array;
                    for(let i=0; i<CONFIG.textParticleCount; i++) {
                        pos[i*3] += (Math.random()-0.5)*0.01; pos[i*3+1] += (Math.random()-0.5)*0.01; pos[i*3+2] += (Math.random()-0.5)*0.01;
                    }
                    textParticles.geometry.attributes.position.needsUpdate = true;
                }
                if (surfaceParticles && currentMode === 'GATHER') {
                    const pos = surfaceParticles.geometry.attributes.position.array;
                    const targets = surfaceParticles.geometry.attributes.targetPos.array;
                    const phases = surfaceParticles.geometry.attributes.phase.array;
                    for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                        const bi = i * 3; const p = phases[i];
                        pos[bi] = targets[bi] + Math.sin(time * 0.4 + p) * 0.15;
                        pos[bi+1] = targets[bi+1] + Math.cos(time * 0.32 + p) * 0.25;
                        pos[bi+2] = targets[bi+2] + Math.cos(time * 0.4 + p) * 0.15;
                    }
                    surfaceParticles.geometry.attributes.position.needsUpdate = true;
                }
                memoryGroup.children.forEach((mesh, idx) => {
                    if (currentMode === 'SCATTER') {
                        mesh.position.y += Math.sin(time + idx) * 0.01;
                        mesh.rotation.y += 0.005;
                    } else { mesh.rotation.y += 0.01; }
                });
                crystalGroup.children.forEach((mesh) => {
                    if (currentMode === 'GATHER') {
                        const pulse = Math.sin(time * 3 + mesh.userData.pulseOffset) * 0.5 + 0.5;
                        mesh.material.emissiveIntensity = 0.6 + pulse * 2.0;
                    } else { mesh.rotation.x += 0.008; mesh.rotation.y += 0.012; }
                });
            }
            composer.render();
        }

        init();
    </script>
</body>
