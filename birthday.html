<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Crystal Dreams - Birthday Edition</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc00ff;
            --glass-bg: rgba(10, 20, 40, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            pointer-events: auto;
            margin: 5px;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #333;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        #status-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 24px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s;
        }

        #cam-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: auto;
            transform: scaleX(-1);
        }

        #hand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video-source {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color:var(--neon-cyan); letter-spacing: 5px;">CRYSTAL DREAMS 2026</h1>
        <div class="loader-bar"><div id="progress" class="loader-progress"></div></div>
        <button id="start-btn" class="btn" style="display:none">生日快乐</button>
    </div>

    <div class="overlay">
        <div class="header">
            <div class="left">
                <button id="fullscreen-btn" class="btn">Full Screen</button>
            </div>
            <div class="right">
                <input type="file" id="media-upload" accept="image/*,video/*" style="display:none">
                <button class="btn" onclick="document.getElementById('media-upload').click()">上传回忆</button>
            </div>
        </div>

        <div id="status-display">INITIALIZING...</div>

        <!--
        <div class="footer">
            <button id="mode-gather" class="btn">聚合形态 (Fist)</button>
            <button id="mode-scatter" class="btn">水晶星云 (Open)</button>
        </div>
        -->

        <div id="cam-preview">
            <video id="video-source" autoplay playsinline></video>
            <canvas id="hand-canvas"></canvas>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import TWEEN from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

        const CONFIG = {
            particleCount: 12000, 
            crystalCount: 500,
            textParticleCount: 4000,
            surfaceParticleCount: 8000,
            primaryColor: 0x00f3ff,
            secondaryColor: 0x7000ff,
            bloomStrength: 1.8,
        };

        let scene, camera, renderer, composer, controls;
        let countdownParticles, crystalGroup, surfaceParticles, textParticles;
        let state = 'LOADING'; 
        let currentMode = 'GATHER'; 
        let clock = new THREE.Clock();
        
        let handLandmarker;
        let video = document.getElementById('video-source');
        let handCanvas = document.getElementById('hand-canvas');
        let handCtx = handCanvas.getContext('2d');

        async function init() {
            setupScene();
            setupPostProcessing();
            setupLights();
            await loadAssets();
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('start-btn').onclick = startExperience;
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false;

            window.addEventListener('resize', onWindowResize);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                CONFIG.bloomStrength, 0.4, 0.85
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(CONFIG.primaryColor, 1500);
            p1.position.set(25, 25, 25);
            scene.add(p1);
            const p2 = new THREE.PointLight(CONFIG.secondaryColor, 1000);
            p2.position.set(-25, 15, -15);
            scene.add(p2);
        }

        // 倒计时数字逻辑
        function getNumberPoints(number) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128; canvas.height = 128;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(number, 64, 64);
            const imgData = ctx.getImageData(0, 0, 128, 128).data;
            const points = [];
            for (let y = 0; y < 128; y += 2) {
                for (let x = 0; x < 128; x += 2) {
                    if (imgData[(y * 128 + x) * 4] > 128) {
                        points.push({ x: (x - 64) * 0.25, y: (64 - y) * 0.25, z: (Math.random() - 0.5) * 2 });
                    }
                }
            }
            return points;
        }

        // 主场景文字生成
        function getPointsFromText(text, size = 1.0) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'white';
            ctx.font = `bold 60px Arial`; // 降低字体大小提高文字清晰度
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            
            const imgData = ctx.getImageData(0, 0, 512, 128).data;
            const points = [];
            for (let y = 0; y < 128; y += 2) {
                for (let x = 0; x < 512; x += 2) {
                    if (imgData[(y * 512 + x) * 4] > 128) {
                        points.push({ 
                            x: (x - 256) * 0.05 * size, 
                            y: (64 - y) * 0.05 * size, 
                            z: (Math.random() - 0.5) * 0.4 
                        });
                    }
                }
            }
            return points;
        }

        function createCountdownParticles() {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);
            for (let i = 0; i < CONFIG.particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 150;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 150;
                colors[i * 3] = 0; colors[i * 3 + 1] = 0.95; colors[i * 3 + 2] = 1;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            countdownParticles = new THREE.Points(geo, mat);
            scene.add(countdownParticles);
        }

        async function animateCountdown() {
            createCountdownParticles();
            const status = document.getElementById('status-display');
            status.style.opacity = '1';
            for (let i = 5; i >= 1; i--) {
                status.innerText = `LINKING... ${i}`;
                const targetPoints = getNumberPoints(i.toString()); 
                morphParticles(targetPoints);
                await new Promise(r => setTimeout(r, 1200));
            }
            status.innerText = "HAPPY BIRTHDAY AWAKENING";
            warpSpeedTransition();
        }

        function morphParticles(targetPoints) {
            const positions = countdownParticles.geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const target = targetPoints[i % targetPoints.length];
                new TWEEN.Tween(positions)
                    .to({ [i * 3]: target.x + (Math.random() - 0.5) * 0.3, [i * 3 + 1]: target.y + (Math.random() - 0.5) * 0.3, [i * 3 + 2]: target.z }, 800)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onUpdate(() => { countdownParticles.geometry.attributes.position.needsUpdate = true; })
                    .start();
            }
        }

        function warpSpeedTransition() {
            const positions = countdownParticles.geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                new TWEEN.Tween(positions)
                    .to({ [i * 3]: positions[i * 3] * 6, [i * 3 + 1]: positions[i * 3 + 1] * 6, [i * 3 + 2]: -600 }, 1500)
                    .easing(TWEEN.Easing.Quadratic.In).start();
            }
            new TWEEN.Tween(camera.position).to({ z: 25, y: 12 }, 2000).easing(TWEEN.Easing.Exponential.Out)
                .onComplete(() => { scene.remove(countdownParticles); initMainScene(); }).start();
        }

        function initMainScene() {
            state = 'MAIN';
            crystalGroup = new THREE.Group();
            scene.add(crystalGroup);
            controls.autoRotate = true;

            const geometries = [new THREE.OctahedronGeometry(0.5), new THREE.IcosahedronGeometry(0.4)];

            createSurfaceParticles();
            createParticleText(); 

            for(let i=0; i<CONFIG.crystalCount; i++) {
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const h = 0.55 + Math.random() * 0.15;
                const color = new THREE.Color().setHSL(h, 0.8, 0.5);
                
                const mat = new THREE.MeshPhysicalMaterial({
                    color: color, metalness: 0.4, roughness: 0.05, transmission: 0.85,
                    transparent: true, opacity: 1, emissive: color, emissiveIntensity: 0.2
                });

                const mesh = new THREE.Mesh(geo, mat);
                
                const isBottomLayer = i < CONFIG.crystalCount * 0.65;
                const radiusLimit = isBottomLayer ? 6 : 3.5;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.sqrt(Math.random()) * radiusLimit; 
                const y = isBottomLayer ? -3 + Math.random() * 3 : 1 + Math.random() * 3;
                
                mesh.userData.targetPos = new THREE.Vector3(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
                mesh.userData.scatterPos = new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
                mesh.userData.pulseOffset = Math.random() * Math.PI * 2;

                mesh.position.set(0,0,0);
                crystalGroup.add(mesh);
            }

            switchMode('GATHER');
            initHandTracking();
        }

        function createParticleText() {
            // 文字改为 HAPPY BIRTHDAY，尺寸减小为 1.6
            const textData = getPointsFromText("HAPPY BIRTHDAY", 2.6);
            const count = CONFIG.textParticleCount;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const targets = new Float32Array(count * 3);
            
            for(let i=0; i<count; i++) {
                const t = textData[i % textData.length];
                targets[i*3] = t.x;
                targets[i*3+1] = t.y + 7.5; 
                targets[i*3+2] = t.z;
                
                pos[i*3] = (Math.random()-0.5)*100;
                pos[i*3+1] = (Math.random()-0.5)*100;
                pos[i*3+2] = (Math.random()-0.5)*100;
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.08,
                color: 0x00f3ff,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending
            });
            
            textParticles = new THREE.Points(geo, mat);
            scene.add(textParticles);
        }

        function createSurfaceParticles() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const targets = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const phases = new Float32Array(CONFIG.surfaceParticleCount);
            
            for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                const isBottom = Math.random() > 0.4;
                const rBase = isBottom ? 6.2 : 3.8;
                const r = rBase + (Math.random() - 0.5) * 0.4;
                const yRange = isBottom ? [-3, 0.5] : [0.5, 4.5];
                
                const angle = Math.random() * Math.PI * 2;
                const isTopSurface = Math.random() > 0.65;
                
                let x, y, z;
                if(isTopSurface) {
                    const rr = Math.sqrt(Math.random()) * r;
                    x = Math.cos(angle) * rr;
                    y = yRange[1] + (Math.random() - 0.5) * 0.2;
                    z = Math.sin(angle) * rr;
                } else {
                    x = Math.cos(angle) * r;
                    y = yRange[0] + Math.random() * (yRange[1] - yRange[0]);
                    z = Math.sin(angle) * r;
                }
                
                targets[i*3] = x; targets[i*3+1] = y; targets[i*3+2] = z;
                pos[i*3] = (Math.random()-0.5)*80; pos[i*3+1] = (Math.random()-0.5)*80; pos[i*3+2] = (Math.random()-0.5)*80;
                phases[i] = Math.random() * Math.PI * 2;
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
            
            const mat = new THREE.PointsMaterial({
                size: 0.06,
                color: CONFIG.primaryColor,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            surfaceParticles = new THREE.Points(geo, mat);
            scene.add(surfaceParticles);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('status-display').innerText = mode === 'GATHER' ? "" : "";
            
            new TWEEN.Tween(surfaceParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();
            new TWEEN.Tween(textParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();

            const sPos = surfaceParticles.geometry.attributes.position.array;
            const sTarget = surfaceParticles.geometry.attributes.targetPos.array;
            for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                const baseIdx = i * 3;
                const targetX = mode === 'GATHER' ? sTarget[baseIdx] : (Math.random()-0.5)*100;
                const targetY = mode === 'GATHER' ? sTarget[baseIdx+1] : (Math.random()-0.5)*100;
                const targetZ = mode === 'GATHER' ? sTarget[baseIdx+2] : (Math.random()-0.5)*100;
                new TWEEN.Tween(sPos).to({ [baseIdx]: targetX, [baseIdx+1]: targetY, [baseIdx+2]: targetZ }, 1500 + Math.random()*800).easing(TWEEN.Easing.Quadratic.InOut).onUpdate(() => surfaceParticles.geometry.attributes.position.needsUpdate = true).start();
            }

            const tPos = textParticles.geometry.attributes.position.array;
            const tTarget = textParticles.geometry.attributes.targetPos.array;
            for(let i=0; i<CONFIG.textParticleCount; i++) {
                const bi = i * 3;
                const tx = mode === 'GATHER' ? tTarget[bi] : (Math.random()-0.5)*120;
                const ty = mode === 'GATHER' ? tTarget[bi+1] : (Math.random()-0.5)*120;
                const tz = mode === 'GATHER' ? tTarget[bi+2] : (Math.random()-0.5)*120;
                new TWEEN.Tween(tPos).to({ [bi]: tx, [bi+1]: ty, [bi+2]: tz }, 1800 + Math.random()*500).easing(TWEEN.Easing.Exponential.Out).onUpdate(() => textParticles.geometry.attributes.position.needsUpdate = true).start();
            }

            crystalGroup.children.forEach(mesh => {
                const targetPos = mode === 'GATHER' ? mesh.userData.targetPos : mesh.userData.scatterPos;
                const targetScale = mode === 'GATHER' ? 0.25 : 1.0;
                new TWEEN.Tween(mesh.position).to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1500).easing(TWEEN.Easing.Quadratic.InOut).start();
                new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 1200).easing(TWEEN.Easing.Back.Out).start();
            });
        }

        async function loadAssets() {
            const progress = document.getElementById('progress');
            for(let i=0; i<=100; i+=10) {
                progress.style.width = i + '%';
                await new Promise(r => setTimeout(r, 20));
            }
        }

        function startExperience() {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading-screen').remove(); animateCountdown(); }, 1000);
        }

        async function initHandTracking() {
            try {
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await vision.HandLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
            } catch (e) { console.warn("Hand Tracking Disabled"); }
        }

        async function predictWebcam() {
            if (!handLandmarker || video.paused) return;
            const results = handLandmarker.detectForVideo(video, performance.now());
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            if (results.landmarks && results.landmarks.length > 0) {
                const l = results.landmarks[0];
                const dist = Math.hypot(l[8].x - l[0].x, l[8].y - l[0].y);
                if (dist < 0.25 && currentMode !== 'GATHER') switchMode('GATHER');
                else if (dist > 0.45 && currentMode !== 'SCATTER') switchMode('SCATTER');
            }
            window.requestAnimationFrame(predictWebcam);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            TWEEN.update();
            controls.update();

            if (state === 'MAIN') {
                if (textParticles && currentMode === 'GATHER') {
                    const pos = textParticles.geometry.attributes.position.array;
                    for(let i=0; i<CONFIG.textParticleCount; i++) {
                        pos[i*3] += (Math.random()-0.5)*0.01;
                        pos[i*3+1] += (Math.random()-0.5)*0.01;
                        pos[i*3+2] += (Math.random()-0.5)*0.01;
                    }
                    textParticles.geometry.attributes.position.needsUpdate = true;
                    textParticles.material.color.setHSL(0.5, 1.0, 0.5 + Math.sin(time*5)*0.1);
                }

                if (surfaceParticles && currentMode === 'GATHER') {
                    const pos = surfaceParticles.geometry.attributes.position.array;
                    const phases = surfaceParticles.geometry.attributes.phase.array;
                    for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                        const bi = i * 3;
                        pos[bi] += Math.sin(time + phases[i]) * 0.005;
                        pos[bi+1] += Math.cos(time * 0.8 + phases[i]) * 0.005;
                        pos[bi+2] += Math.sin(time * 1.2 + phases[i]) * 0.005;
                    }
                    surfaceParticles.geometry.attributes.position.needsUpdate = true;
                    surfaceParticles.material.color.setHSL(0.52 + Math.sin(time*0.3)*0.08, 0.9, 0.65);
                }

                crystalGroup.children.forEach((mesh) => {
                    if (currentMode === 'GATHER') {
                        const pulse = Math.sin(time * 3 + mesh.userData.pulseOffset) * 0.5 + 0.5;
                        mesh.material.opacity = 0.5 + pulse * 0.5;
                        mesh.material.emissiveIntensity = 0.6 + pulse * 2.0;
                    } else {
                        mesh.material.opacity = 1.0;
                        mesh.material.emissiveIntensity = 0.3;
                        mesh.rotation.x += 0.008;
                        mesh.rotation.y += 0.012;
                    }
                });
            }
            composer.render();
        }

        init();
        animate();
    </script>
</body>
</html>
