<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Crystal Dreams - Orbitron Edition</title>
    <!-- 引入 Orbitron 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc00ff;
            --glass-bg: rgba(10, 20, 40, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Orbitron', 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            pointer-events: auto;
            margin: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #333;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        #status-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 32px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
        }

        #photo-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 80%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }

        #photo-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #photo-modal img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .close-modal {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 30px;
            height: 30px;
            background: var(--neon-cyan);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        #cam-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            background: #000;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: auto;
            transform: scaleX(-1);
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        #cam-preview:hover { opacity: 1; }

        #hand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video-source {
            display: none;
        }
    </style>
</head>
<body>
	<audio id="bgm" src="music.mp3" preload="auto"></audio>
    <div id="loading-screen">
        <h1 style="color:var(--neon-cyan); letter-spacing: 5px;">2026 / 04 / 22</h1>
        <div class="loader-bar"><div id="progress" class="loader-progress"></div></div>
        <button id="start-btn" class="btn" style="display:none">开启礼物</button>
    </div>

    <div id="photo-modal">
        <div class="close-modal" id="close-modal">×</div>
        <img id="modal-img" src="" alt="Memory">
        <p style="margin-top:15px; color:var(--neon-cyan); font-style: italic;">时光记忆碎片</p>
    </div>

    <div class="overlay">
        <div class="header">
            <button id="fullscreen-btn" class="btn">全屏</button>
            <div class="right">
                <input type="file" id="media-upload" accept="image/*" multiple style="display:none">
                <button class="btn" id="upload-btn">上传回忆</button>
            </div>
        </div>

        <div id="status-display">INITIALIZING...</div>

        <div class="footer">
            <button id="mode-gather" class="btn">聚合形态</button>
            <button id="mode-scatter" class="btn">星云形态</button>
        </div>

        <div id="cam-preview">
            <video id="video-source" autoplay playsinline></video>
            <canvas id="hand-canvas"></canvas>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
		let beat = 0;
		let audio, audioCtx, analyser, dataArray;
		let audioStarted = false;
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import TWEEN from 'https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

        const CONFIG = {
            particleCount: 12000, 
            crystalCount: 500,
            textParticleCount: 4000,
            surfaceParticleCount: 8000, 
            starCount: 20000, 
            primaryColor: 0x00f3ff,
            secondaryColor: 0x7000ff,
            bloomStrength: 1.8,
            fontFamily: 'Orbitron'
        };

        let scene, camera, renderer, composer, controls;
        let countdownParticles, crystalGroup, surfaceParticles, textParticles, starField;
        let memoryGroup; 
        let state = 'LOADING'; 
        let currentMode = 'GATHER'; 
        let clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let handLandmarker;
        let video = document.getElementById('video-source');
        let handCanvas = document.getElementById('hand-canvas');
        let handCtx = handCanvas.getContext('2d');

        async function init() {
            try {
                // 确保 Orbitron 字体加载
                await document.fonts.load('bold 20px "Orbitron"');
                
                setupScene();
                setupPostProcessing();
                setupLights();
                createStarField(); 
                await loadAssets();
                
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('start-btn').onclick = startExperience;
                document.getElementById('upload-btn').onclick = () => document.getElementById('media-upload').click();
                document.getElementById('media-upload').onchange = handleUpload;
                document.getElementById('close-modal').onclick = closeModal;
                document.getElementById('mode-gather').onclick = () => switchMode('GATHER');
                document.getElementById('mode-scatter').onclick = () => switchMode('SCATTER');
                document.getElementById('fullscreen-btn').onclick = toggleFullScreen;
                
                window.addEventListener('mousedown', onDocumentMouseDown);
                
                // 初始化完成，标记状态
                state = 'READY';
            } catch (err) {
                console.error("Initialization error:", err);
            }
			
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 15, 80); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = false;

            window.addEventListener('resize', onWindowResize);
        }

        function createStarField() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.starCount * 3);
            const colors = new Float32Array(CONFIG.starCount * 3);
            
            for (let i = 0; i < CONFIG.starCount; i++) {
                const r = 600 + Math.random() * 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
                
                const mix = Math.random();
                if (mix > 0.9) {
                    colors[i * 3] = 0.5; colors[i * 3 + 1] = 0.8; colors[i * 3 + 2] = 1;
                } else if (mix > 0.8) {
                    colors[i * 3] = 0.8; colors[i * 3 + 1] = 0.5; colors[i * 3 + 2] = 1;
                } else {
                    colors[i * 3] = 1; colors[i * 3 + 1] = 1; colors[i * 3 + 2] = 1;
                }
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });
            
            starField = new THREE.Points(geo, mat);
            scene.add(starField);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                CONFIG.bloomStrength, 0.4, 0.85
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(CONFIG.primaryColor, 1500);
            p1.position.set(25, 25, 25);
            scene.add(p1);
            const p2 = new THREE.PointLight(CONFIG.secondaryColor, 1000);
            p2.position.set(-25, 15, -15);
            scene.add(p2);
        }

        function getNumberPoints(number) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 256;
            ctx.fillStyle = 'white';
            ctx.font = `900 200px ${CONFIG.fontFamily}`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(number, 128, 128);
            const imgData = ctx.getImageData(0, 0, 256, 256).data;
            const points = [];
            for (let y = 0; y < 256; y += 8) {
                for (let x = 0; x < 256; x += 8) {
                    if (imgData[(y * 256 + x) * 4] > 128) {
                        points.push({ 
                            x: (x - 128) * 0.22, 
                            y: (128 - y) * 0.22, 
                            z: (Math.random() - 0.5) * 3 
                        });
                    }
                }
            }
            return points;
        }

        function createCountdownParticles() {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);
            for (let i = 0; i < CONFIG.particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 1000;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 1000;
                colors[i * 3] = 0.2; colors[i * 3 + 1] = 0.8; colors[i * 3 + 2] = 1;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ 
                size: 0.15, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8, 
                blending: THREE.AdditiveBlending 
            });
            countdownParticles = new THREE.Points(geo, mat);
            scene.add(countdownParticles);
        }

        async function animateCountdown() {
            createCountdownParticles();
            const status = document.getElementById('status-display');
            status.style.opacity = '1';
            
            for (let i = 5; i >= 1; i--) {
                status.innerText = `${i}`;
                const targetPoints = getNumberPoints(i.toString()); 
                await morphCountdownParticles(targetPoints);
                await new Promise(r => setTimeout(r, 600)); 
                if(i > 1) await explodeCountdownParticles();
            }
			await explodeCountdownParticles();
            // 淡出
			new TWEEN.Tween(countdownParticles.material)
				.to({ opacity: 0 }, 600)
				.onComplete(() => {
					scene.remove(countdownParticles);
				})
				.start();

			// 稍微等一下再进入爱心
			await new Promise(r => setTimeout(r, 500));

			// ===== ❤️ 爱心阶段 =====
			const heart = createMorphParticles(getHeartPoints());
			await animateMorph(heart);
			pulse(heart);

			// 停留
			await new Promise(r => setTimeout(r, 1500));

			// ===== 👤 名字阶段 =====
			const nameText = "선 희"; // 👉 改成名字
			const nameMesh = createMorphParticles(getPointsFromText(nameText, 2));
			heart.material.opacity = 0;

			await animateMorph(nameMesh);

			// 停留
			await new Promise(r => setTimeout(r, 1200));

			// ===== 🎂 生日快乐 =====
			const textMesh = createMorphParticles(getPointsFromText("生日快乐", 2.2));
			nameMesh.material.opacity = 0;

			await animateMorph(textMesh);
			await animateMorph(textMesh);

			// 停留一会
			await new Promise(r => setTimeout(r, 1500));

			// 淡出
			new TWEEN.Tween(textMesh.material)
				.to({ opacity: 0 }, 800)
				.onComplete(() => {
					scene.remove(textMesh);
					warpSpeedTransition(); // 🚀 进入主场景
				})
				.start();
			
		}

        function explodeCountdownParticles() {
            return new Promise(resolve => {
                const positions = countdownParticles.geometry.attributes.position.array;
                const duration = 400 + beat * 400;
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    new TWEEN.Tween(positions)
                        .to({ 
                            [i * 3]: (Math.random() - 0.5) * 800, 
                            [i * 3 + 1]: (Math.random() - 0.5) * 800, 
                            [i * 3 + 2]: (Math.random() - 0.5) * 800 
                        }, duration)
                        .easing(TWEEN.Easing.Exponential.Out)
                        .onUpdate(() => { countdownParticles.geometry.attributes.position.needsUpdate = true; })
                        .start();
                }
                setTimeout(resolve, duration);
            });
        }

        function morphCountdownParticles(targetPoints) {
            return new Promise(resolve => {
                const positions = countdownParticles.geometry.attributes.position.array;
                const duration = 1400;
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    const target = targetPoints[i % targetPoints.length];
                    const tx = target.x + (Math.random() - 0.5) * 1.2;
                    const ty = target.y + (Math.random() - 0.5) * 1.2;
                    const tz = target.z;
                    new TWEEN.Tween(positions)
                        .to({ [i * 3]: tx, [i * 3 + 1]: ty, [i * 3 + 2]: tz }, duration)
                        .easing(TWEEN.Easing.Quintic.Out)
                        .onUpdate(() => { countdownParticles.geometry.attributes.position.needsUpdate = true; })
                        .start();
                }
                setTimeout(resolve, duration);
            });
        }
		
		function createExplosionFlash() {
			const light = new THREE.PointLight(0x00f3ff, 5000, 200);
			light.position.set(0, 0, 0);
			scene.add(light);

			new TWEEN.Tween(light)
				.to({ intensity: 0 }, 800)
				.onComplete(() => scene.remove(light))
				.start();
		}

        function warpSpeedTransition() {
            const positions = countdownParticles.geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                new TWEEN.Tween(positions)
                    .to({ [i * 3]: positions[i * 3] * 20, [i * 3 + 1]: positions[i * 3 + 1] * 20, [i * 3 + 2]: -1500 }, 2000)
                    .easing(TWEEN.Easing.Quadratic.In)
                    .start();
            }
            new TWEEN.Tween(camera.position)
                .to({ z: 25, y: 12 }, 2200)
                .easing(TWEEN.Easing.Exponential.Out)
                .onComplete(() => { 
                    scene.remove(countdownParticles); 
					createExplosionFlash();
                    initMainScene(); 
                }).start();
        }
		function getHeartPoints(scale = 1.5) {
			const pts = [];
			for (let t = 0; t < Math.PI * 2; t += 0.02) {
				const x = 16 * Math.pow(Math.sin(t), 3);
				const y =
					13 * Math.cos(t) -
					5 * Math.cos(2 * t) -
					2 * Math.cos(3 * t) -
					Math.cos(4 * t);
	
				pts.push({
					x: x * 0.2 * scale,
					y: y * 0.2 * scale,
					z: (Math.random() - 0.5) * 2
				});
			}
			return pts;
		}
		function createMorphParticles(points) {
			const geo = new THREE.BufferGeometry();
			const pos = new Float32Array(CONFIG.particleCount * 3);
			const target = new Float32Array(CONFIG.particleCount * 3);

			for (let i = 0; i < CONFIG.particleCount; i++) {
				const t = points[i % points.length];

				target[i * 3] = t.x;
				target[i * 3 + 1] = t.y;
				target[i * 3 + 2] = t.z;

				pos[i * 3] = (Math.random() - 0.5) * 800;
				pos[i * 3 + 1] = (Math.random() - 0.5) * 800;
				pos[i * 3 + 2] = (Math.random() - 0.5) * 800;
			}

			geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
			geo.setAttribute('target', new THREE.BufferAttribute(target, 3));

			const mat = new THREE.PointsMaterial({
				size: 0.18,
				color: 0xff4da6, // 爱心粉
				transparent: true,
				opacity: 0
			});

			const mesh = new THREE.Points(geo, mat);
			scene.add(mesh);

			return mesh;
		}
		
		function animateMorph(mesh, duration = 2000) {
			return new Promise(resolve => {
				const pos = mesh.geometry.attributes.position.array;
				const target = mesh.geometry.attributes.target.array;

				mesh.material.opacity = 1;

				for (let i = 0; i < CONFIG.particleCount; i++) {
					new TWEEN.Tween(pos)
						.to({
							[i * 3]: target[i * 3],
							[i * 3 + 1]: target[i * 3 + 1],
							[i * 3 + 2]: target[i * 3 + 2]
						}, duration)
						.easing(TWEEN.Easing.Exponential.Out)
						.onUpdate(() => mesh.geometry.attributes.position.needsUpdate = true)
						.start();
				}

				setTimeout(resolve, duration + 300);
			});
		}
		
		function pulse(mesh) {
			const base = mesh.material;

			function loop() {
				new TWEEN.Tween(base)
					.to({ opacity: 1 }, 600)
					.yoyo(true)
					.repeat(1)
					.onComplete(loop)
					.start();
			}

			loop();
		}

        function initMainScene() {
            state = 'MAIN';
            crystalGroup = new THREE.Group();
            scene.add(crystalGroup);
            memoryGroup = new THREE.Group();
            scene.add(memoryGroup);
            controls.autoRotate = true;

            const geometries = [new THREE.OctahedronGeometry(0.5), new THREE.IcosahedronGeometry(0.4)];

            createSurfaceParticles();
            createParticleText(); 

            for(let i=0; i<CONFIG.crystalCount; i++) {
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const h = 0.55 + Math.random() * 0.15;
                const color = new THREE.Color().setHSL(h, 0.8, 0.5);
                const mat = new THREE.MeshPhysicalMaterial({ color: color, metalness: 0.4, roughness: 0.05, transmission: 0.85, transparent: true, opacity: 1, emissive: color, emissiveIntensity: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);
                const isBottomLayer = i < CONFIG.crystalCount * 0.65;
                const radiusLimit = isBottomLayer ? 6 : 3.5;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.sqrt(Math.random()) * radiusLimit; 
                const y = isBottomLayer ? -3 + Math.random() * 3 : 1 + Math.random() * 3;
                mesh.userData.targetPos = new THREE.Vector3(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
                mesh.userData.scatterPos = new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
                mesh.userData.pulseOffset = Math.random() * Math.PI * 2;
                mesh.position.set(0,0,0);
                crystalGroup.add(mesh);
            }

            switchMode('GATHER');
            initHandTracking();
			video.addEventListener("loadeddata", () => {
				handCanvas.width = video.videoWidth;
				handCanvas.height = video.videoHeight;
				predictWebcam();
			});
        }

        function handleUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => createMemoryFragment(e.target.result);
                reader.readAsDataURL(file);
            });
            document.getElementById('status-display').innerText = `MEMORY ${files.length} IMPORTED`;
            setTimeout(() => { if(state === 'MAIN') document.getElementById('status-display').innerText = currentMode === 'GATHER' ? "HAPPY BIRTHDAY" : "NEBULA SCANNING"; }, 2000);
        }

        function createMemoryFragment(imgSrc) {
            const loader = new THREE.TextureLoader();
            loader.load(imgSrc, (texture) => {
                const geo = new THREE.BoxGeometry(2, 2, 0.2);
                const mats = [
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }),
                    new THREE.MeshStandardMaterial({ map: texture }),
                    new THREE.MeshStandardMaterial({ map: texture }),
                ];
                const mesh = new THREE.Mesh(geo, mats);
                mesh.userData.isMemory = true; mesh.userData.imgSrc = imgSrc;
                mesh.position.set(0, 5, 0); mesh.scale.set(0.1, 0.1, 0.1);
                const angle = Math.random() * Math.PI * 2;
                const dist = 15 + Math.random() * 15;
                const y = (Math.random() - 0.5) * 15;
                mesh.userData.scatterPos = new THREE.Vector3(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
                mesh.userData.gatherPos = new THREE.Vector3((Math.random()-0.5)*5, 2 + Math.random()*5, (Math.random()-0.5)*5);
                memoryGroup.add(mesh);
                const target = currentMode === 'GATHER' ? mesh.userData.gatherPos : mesh.userData.scatterPos;
                const targetScale = currentMode === 'GATHER' ? 0.3 : 1.5;
                new TWEEN.Tween(mesh.position).to({ x: target.x, y: target.y, z: target.z }, 2000).easing(TWEEN.Easing.Elastic.Out).start();
                new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 2000).easing(TWEEN.Easing.Elastic.Out).start();
            });
        }

        function onDocumentMouseDown(event) {
            if (currentMode !== 'SCATTER' || !memoryGroup) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(memoryGroup.children);
            if (intersects.length > 0) {
                const clicked = intersects[0].object;
                if (clicked.userData.isMemory) showPhotoModal(clicked.userData.imgSrc, clicked.position);
            }
        }

        function showPhotoModal(src, pos) {
            const modal = document.getElementById('photo-modal');
            document.getElementById('modal-img').src = src;
            modal.classList.add('active');
            new TWEEN.Tween(camera.position).to({ x: pos.x * 1.5, y: pos.y, z: pos.z * 1.5 }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
            new TWEEN.Tween(controls.target).to({ x: pos.x, y: pos.y, z: pos.z }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
        }

        function closeModal() {
            document.getElementById('photo-modal').classList.remove('active');
            new TWEEN.Tween(controls.target).to({ x: 0, y: 0, z: 0 }, 1000).start();
        }

        function createParticleText() {
            const textData = getPointsFromText("HAPPY BIRTHDAY", 1.2);
            const count = CONFIG.textParticleCount;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const targets = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                const t = textData[i % textData.length];
                targets[i*3] = t.x; targets[i*3+1] = t.y + 8.5; targets[i*3+2] = t.z;
                pos[i*3] = (Math.random()-0.5)*100; pos[i*3+1] = (Math.random()-0.5)*100; pos[i*3+2] = (Math.random()-0.5)*100;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            const mat = new THREE.PointsMaterial({ size: 0.12, color: 0x00f3ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
            textParticles = new THREE.Points(geo, mat);
            scene.add(textParticles);
        }

        function getPointsFromText(text, size = 1.0) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 600; canvas.height = 150;
            ctx.fillStyle = 'white'; 
            ctx.font = `bold 60px ${CONFIG.fontFamily}`; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 300, 75);
            const imgData = ctx.getImageData(0, 0, 600, 150).data;
            const points = [];
            for (let y = 0; y < 150; y += 2) {
                for (let x = 0; x < 600; x += 2) {
                    if (imgData[(y * 600 + x) * 4] > 160) {
                        points.push({ x: (x - 300) * 0.05 * size, y: (75 - y) * 0.05 * size, z: (Math.random() - 0.5) * 0.5 });
                    }
                }
            }
            return points;
        }

        function createSurfaceParticles() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const targets = new Float32Array(CONFIG.surfaceParticleCount * 3);
            const phases = new Float32Array(CONFIG.surfaceParticleCount);
            for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                const isBottom = Math.random() > 0.4;
                const rBase = isBottom ? 6.2 : 3.8;
                const r = rBase + (Math.random() - 0.5) * 0.4;
                const yRange = isBottom ? [-3, 0.5] : [0.5, 4.5];
                const angle = Math.random() * Math.PI * 2;
                let x, y, z;
                if(Math.random() > 0.65) {
                    const rr = Math.sqrt(Math.random()) * r;
                    x = Math.cos(angle) * rr; y = yRange[1] + (Math.random() - 0.5) * 0.2; z = Math.sin(angle) * rr;
                } else {
                    x = Math.cos(angle) * r; y = yRange[0] + Math.random() * (yRange[1] - yRange[0]); z = Math.sin(angle) * r;
                }
                targets[i*3] = x; targets[i*3+1] = y; targets[i*3+2] = z;
                pos[i*3] = (Math.random()-0.5)*80; pos[i*3+1] = (Math.random()-0.5)*80; pos[i*3+2] = (Math.random()-0.5)*80;
                phases[i] = Math.random() * Math.PI * 2;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('targetPos', new THREE.BufferAttribute(targets, 3));
            geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
            const mat = new THREE.PointsMaterial({ size: 0.1, color: CONFIG.primaryColor, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
            surfaceParticles = new THREE.Points(geo, mat);
            scene.add(surfaceParticles);
        }

        function switchMode(mode) {
            if (!state || state === 'LOADING') return;
            currentMode = mode;
            const status = document.getElementById('status-display');
            status.style.opacity = '1';
            status.innerText = mode === 'GATHER' ? "CRYSTAL CAKE" : "MEMORY NEBULA";
            if(mode === 'SCATTER') setTimeout(() => { if(currentMode === 'SCATTER') status.style.opacity = '0.3'; }, 2000);
            
            if (surfaceParticles) new TWEEN.Tween(surfaceParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();
            if (textParticles) new TWEEN.Tween(textParticles.material).to(mode === 'GATHER' ? {opacity: 1.0} : {opacity: 0}, 1200).start();

            [surfaceParticles, textParticles].forEach(pSystem => {
                if (!pSystem) return;
                const pos = pSystem.geometry.attributes.position.array;
                const targets = pSystem.geometry.attributes.targetPos.array;
                const count = pos.length / 3;
                for(let i=0; i<count; i++) {
                    const bi = i * 3;
                    const tx = mode === 'GATHER' ? targets[bi] : (Math.random()-0.5)*120;
                    const ty = mode === 'GATHER' ? targets[bi+1] : (Math.random()-0.5)*120;
                    const tz = mode === 'GATHER' ? targets[bi+2] : (Math.random()-0.5)*120;
                    new TWEEN.Tween(pos).to({ [bi]: tx, [bi+1]: ty, [bi+2]: tz }, 1500 + Math.random()*800).easing(TWEEN.Easing.Quadratic.InOut).onUpdate(() => pSystem.geometry.attributes.position.needsUpdate = true).start();
                }
            });

            if (crystalGroup) {
                crystalGroup.children.forEach(mesh => {
                    const targetPos = mode === 'GATHER' ? mesh.userData.targetPos : mesh.userData.scatterPos;
                    const targetScale = mode === 'GATHER' ? 0.25 : 1.0;
                    new TWEEN.Tween(mesh.position).to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1500).easing(TWEEN.Easing.Quadratic.InOut).start();
                    new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 1200).easing(TWEEN.Easing.Back.Out).start();
                });
            }

            if (memoryGroup) {
                memoryGroup.children.forEach(mesh => {
                    const targetPos = mode === 'GATHER' ? mesh.userData.gatherPos : mesh.userData.scatterPos;
                    const targetScale = mode === 'GATHER' ? 0.3 : 1.5;
                    new TWEEN.Tween(mesh.position).to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1800).easing(TWEEN.Easing.Exponential.Out).start();
                    new TWEEN.Tween(mesh.scale).to({ x: targetScale, y: targetScale, z: targetScale }, 1500).easing(TWEEN.Easing.Elastic.Out).start();
                });
            }
        }

        async function loadAssets() {
            const progress = document.getElementById('progress');
            for(let i=0; i<=100; i+=10) {
                progress.style.width = i + '%';
                await new Promise(r => setTimeout(r, 40));
            }
        }

		function startExperience() {
			if (!audioStarted) {
				initAudio();
				audioCtx.resume();
				audio.play();
				audioStarted = true;
			}

			document.getElementById('loading-screen').style.opacity = '0';

			setTimeout(() => { 
				const loadingScreen = document.getElementById('loading-screen');
				if (loadingScreen) loadingScreen.remove(); 
				animateCountdown(); 
			}, 1000);
		}

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        async function initHandTracking() {
            try {
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const filesetResolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await vision.HandLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } }).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
            } catch (e) { console.warn("Hand Tracking Disabled"); }
        }

        async function predictWebcam() {
            if (!handLandmarker || video.paused) return;
            const results = handLandmarker.detectForVideo(video, performance.now());
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            if (results.landmarks && results.landmarks.length > 0) {
                const l = results.landmarks[0];
                const thumbTip = l[4];
                const indexTip = l[8];
                const dist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                
                if (dist < 0.1 && currentMode !== 'GATHER') switchMode('GATHER');
                else if (dist > 0.3 && currentMode !== 'SCATTER') switchMode('SCATTER');
            }
            window.requestAnimationFrame(predictWebcam);
        }

        function onWindowResize() {
            if (!camera || !renderer || !composer) return;
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }
		function initAudio() {
			audio = document.getElementById('bgm');

			audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			const source = audioCtx.createMediaElementSource(audio);

			analyser = audioCtx.createAnalyser();
			analyser.fftSize = 256;

			source.connect(analyser);
			analyser.connect(audioCtx.destination);

			dataArray = new Uint8Array(analyser.frequencyBinCount);
		}		
        function animate() {
            requestAnimationFrame(animate);
            

			if (analyser) {
				analyser.getByteFrequencyData(dataArray);

				let sum = 0;
				for (let i = 0; i < dataArray.length; i++) {
					sum += dataArray[i];
				}
				beat = sum / dataArray.length / 255; // 0~1
			}
            // 关键修复：确保所有核心对象都已定义
            if (!scene || !camera || !renderer || !composer || !controls) return;
            
            const time = clock.getElapsedTime();
            TWEEN.update();
            controls.update();
			if (beat > 0.6 && Math.random() > 0.85) {
				createExplosionFlash();
			}
            if (starField) {
			const starPos = starField.geometry.attributes.position.array;

			for (let i = 0; i < starPos.length; i += 3) {
				starPos[i + 2] += 0.05 + beat * 0.5; // 往前流动
    
				if (starPos[i + 2] > 600) {
					starPos[i + 2] = -600;
				}
			}

			starField.geometry.attributes.position.needsUpdate = true;
                
            }

            if (state === 'MAIN') {
                if (textParticles && currentMode === 'GATHER') {
                    const pos = textParticles.geometry.attributes.position.array;
                    for(let i=0; i<CONFIG.textParticleCount; i++) {
                        pos[i*3] += Math.sin(time * 2 + i) * 0.002;
                        pos[i*3+1] += Math.cos(time * 2 + i) * 0.002;
                    }
                    textParticles.geometry.attributes.position.needsUpdate = true;
                }

                if (surfaceParticles && currentMode === 'GATHER') {
                    const pos = surfaceParticles.geometry.attributes.position.array;
                    const targets = surfaceParticles.geometry.attributes.targetPos.array;
                    const phases = surfaceParticles.geometry.attributes.phase.array;
                    
                    for(let i=0; i<CONFIG.surfaceParticleCount; i++) {
                        const bi = i * 3;
                        const p = phases[i];
                        const flowSpeed = 0.4;
                        pos[bi] = targets[bi] + Math.sin(time * flowSpeed + p) * 0.15;
                        pos[bi+1] = targets[bi+1] + Math.cos(time * flowSpeed * 0.8 + p) * 0.25;
                        pos[bi+2] = targets[bi+2] + Math.cos(time * flowSpeed + p) * 0.15;
                    }
                    surfaceParticles.geometry.attributes.position.needsUpdate = true;
                }

                if (memoryGroup) {
                    memoryGroup.children.forEach((mesh, idx) => {
                        if (currentMode === 'SCATTER') {
                            mesh.position.y += Math.sin(time + idx) * 0.015;
                            mesh.rotation.y += 0.01;
                        } else { 
                            mesh.rotation.y += 0.02; 
                        }
                    });
                }

                if (crystalGroup) {
                    crystalGroup.children.forEach((mesh) => {
                        if (currentMode === 'GATHER') {
                            const pulse = Math.sin(time * 3 + mesh.userData.pulseOffset) * 0.5 + 0.5;
                            mesh.material.emissiveIntensity = 0.6 + pulse * 2.0 + beat * 3;;
                        } else { 
                            mesh.rotation.x += 0.01; mesh.rotation.y += 0.015; 
                        }
                    });
                }
            }
            composer.render();
        }

        // 启动程序
		
        init();
        animate();
    </script>
</body>
</html>
